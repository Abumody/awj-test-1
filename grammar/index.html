<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AWJ Assessment Platform</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>

  <div class="page">

    <div class="card">
      <div class="logo">
        <span>AWJ</span>
      </div>

      <h1>Welcome</h1>

      <p class="intro">
        This platform is designed for serious practice under exam conditions.
        Please enter your full name to continue.
      </p>

      <input 
        type="text" 
        id="studentName" 
        placeholder="Full name"
        autocomplete="off"
      >

      <button onclick="enterPlatform()">Continue</button>

      <p class="note">
        Make sure your name is correct.  
        Your results will be saved under this name.
      </p>
    </div>

  </div>

  <script src="js/storage.js"></script>
</body>
</html>
